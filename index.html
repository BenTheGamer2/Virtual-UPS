<script>
/* ================================
   VUPS REAL-TIME AI ENGINE
   (Keeps Existing UI Intact)
================================ */

/* ===== Treasury ===== */
let treasury = localStorage.getItem("vups_treasury")
  ? parseFloat(localStorage.getItem("vups_treasury"))
  : 5900000000;

document.getElementById("treasury").innerText =
  "$" + treasury.toLocaleString();

/* ===== Hubs ===== */
const hubs = {
  KSDF:{lat:38.17,lon:-85.73,weight:4},
  EDDK:{lat:50.86,lon:7.14,weight:2},
  VHHH:{lat:22.30,lon:113.91,weight:2},
  KONT:{lat:34.05,lon:-117.60,weight:2},
  KHSV:{lat:34.63,lon:-86.77,weight:1}
};

/* ===== Pilots ===== */
let pilots = JSON.parse(localStorage.getItem("vups_pilots")) || [
  {name:"AI Chen",fatigue:0},
  {name:"AI Martinez",fatigue:0},
  {name:"AI Singh",fatigue:0},
  {name:"AI Rossi",fatigue:0}
];

/* ===== Flights ===== */
let flights = JSON.parse(localStorage.getItem("vups_flights")) || [];

/* ===== Utilities ===== */
function saveAll(){
  localStorage.setItem("vups_treasury",treasury);
  localStorage.setItem("vups_pilots",JSON.stringify(pilots));
  localStorage.setItem("vups_flights",JSON.stringify(flights));
}

function hav(a,b){
  const R=3440;
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(b.lat-a.lat);
  const dLon=toRad(b.lon-a.lon);
  const lat1=toRad(a.lat);
  const lat2=toRad(b.lat);
  const aCalc=Math.sin(dLat/2)**2+
    Math.sin(dLon/2)**2*Math.cos(lat1)*Math.cos(lat2);
  const c=2*Math.atan2(Math.sqrt(aCalc),Math.sqrt(1-aCalc));
  return R*c;
}

function weightedHub(){
  let total=0;
  Object.values(hubs).forEach(h=>total+=h.weight);
  let r=Math.random()*total;
  for(let k in hubs){
    r-=hubs[k].weight;
    if(r<=0) return k;
  }
}

/* ===== Dispatch ===== */
function dispatch(pilot){
  let from=weightedHub();
  let to=weightedHub();
  while(to===from) to=weightedHub();

  const dist=hav(hubs[from],hubs[to]);
  const blockHours=(dist/480)+0.7;

  let aircraft="B757F";
  if(dist>2500) aircraft="B767F";
  if(dist>4500) aircraft="B747-8F";

  let delay=0;
  if(Math.random()<0.15) delay=0.5;

  const revenue=Math.floor(Math.random()*180000)+60000;

  flights.push({
    id:"5Y"+Math.floor(Math.random()*900+100),
    pilot:pilot.name,
    from,to,
    aircraft,
    start:Date.now(),
    duration:(blockHours+delay)*3600000,
    revenue
  });
}

/* ===== Engine ===== */
function engine(){
  const now=Date.now();

  flights = flights.filter(f=>{
    const pct=(now-f.start)/f.duration;
    if(pct>=1){
      treasury += f.revenue * 0.45;

      const p=pilots.find(x=>x.name===f.pilot);
      p.fatigue += 8;

      dispatch(p);
      return false;
    }
    return true;
  });

  pilots.forEach(p=>{
    if(!flights.find(f=>f.pilot===p.name)){
      dispatch(p);
    }
    if(p.fatigue>0) p.fatigue-=0.03;
  });

  renderFlights();
  document.getElementById("treasury").innerText =
    "$"+treasury.toLocaleString();

  saveAll();
}

/* ===== Render ===== */
function renderFlights(){
  const table=document.getElementById("flight-table");
  table.innerHTML="";
  const now=Date.now();

  flights.forEach(f=>{
    const pct=Math.min(1,(now-f.start)/f.duration);
    const eta=new Date(f.start+f.duration)
      .toUTCString().split(" ")[4];

    table.innerHTML += `
      <tr>
        <td>${f.id}</td>
        <td>${f.from}→${f.to}</td>
        <td>${f.aircraft}</td>
        <td>${f.pilot}</td>
        <td>${(pct*100).toFixed(1)}%</td>
        <td>${eta}Z</td>
        <td>$${f.revenue.toLocaleString()}</td>
        <td>${pilots.find(p=>p.name===f.pilot).fatigue.toFixed(1)}%</td>
      </tr>
    `;
  });
}

/* ===== STOCK BAR ===== */
async function loadStock(){
  let key = localStorage.getItem("finnhub_key");

  if(!key){
    key = prompt("Enter your FREE Finnhub API key:");
    if(key){
      localStorage.setItem("finnhub_key",key);
    } else return;
  }

  try{
    const ups = await fetch(`https://finnhub.io/api/v1/quote?symbol=UPS&token=${key}`).then(r=>r.json());
    const fdx = await fetch(`https://finnhub.io/api/v1/quote?symbol=FDX&token=${key}`).then(r=>r.json());

    const vups = (ups.c * 1.15).toFixed(2);

    document.getElementById("stock-bar").innerHTML =
      `UPS: $${ups.c} | FedEx: $${fdx.c} | VUPS: $${vups}`;
  }catch(e){
    console.log("Stock fetch error");
  }
}

/* ===== Boot ===== */
engine();
renderFlights();
loadStock();

setInterval(engine,60000);
setInterval(loadStock,60000);
      </script>
