<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Virtual UPS Airlines</title>

<style>
body{margin:0;font-family:Arial;background:#1b140f;color:#f2e6d8}
nav{background:#2a1d15;padding:15px;display:flex;gap:20px}
nav a{color:#d4af37;text-decoration:none;font-weight:bold;cursor:pointer}
.section{display:none;padding:20px}
.active{display:block}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #3a2a20;padding:8px;text-align:center}
th{background:#2a1d15}
.badge{padding:4px 8px;border-radius:4px}
.b-blue{background:#1e3a5f}
#stockbar{background:#000;padding:8px;font-size:14px}
</style>
</head>

<body>

<div id="stockbar">Loading stocks...</div>

<nav>
<a onclick="show('dispatch')">Dispatch</a>
<a onclick="show('crew')">Crew</a>
<a onclick="show('leadership')">Leadership</a>
<a onclick="show('news')">News</a>
<a onclick="show('fleet')">Fleet</a>
<a onclick="show('economy')">Economy</a>
<a onclick="show('hubs')">Hubs</a>
<a href="admin.html">Admin</a>
</nav>

<div id="dispatch" class="section active">
<h2>Active Flights</h2>
<h3>Treasury: <span id="treasury-display"></span></h3>

<table>
<thead>
<tr>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>Pilot</th>
<th>Progress</th>
<th>ETA</th>
<th>Revenue</th>
<th>Fatigue</th>
</tr>
</thead>
<tbody id="flight-tbody"></tbody>
</table>
</div>

<div id="crew" class="section"><h2>Crew Ops</h2></div>
<div id="leadership" class="section">
<h2>Leadership</h2>
CEO: David Abney (Retiring)<br>
Incoming CEO: Ben Hoffman
</div>
<div id="news" class="section"><h2>Company News</h2></div>
<div id="fleet" class="section"><h2>Fleet</h2></div>
<div id="economy" class="section"><h2>Economy</h2></div>
<div id="hubs" class="section"><h2>Hubs</h2></div>

<script>

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= TREASURY ================= */
let treasury = localStorage.getItem("vups_treasury")
 ? parseFloat(localStorage.getItem("vups_treasury"))
 : 5900000000;

document.getElementById("treasury-display")
.innerText="$"+treasury.toLocaleString();

/* ================= HUBS ================= */
const hubs={
KSDF:{lat:38.17,lon:-85.73,weight:4},
EDDK:{lat:50.86,lon:7.14,weight:2},
VHHH:{lat:22.30,lon:113.91,weight:2},
KONT:{lat:34.05,lon:-117.60,weight:2},
KHSV:{lat:34.63,lon:-86.77,weight:1}
};

/* ================= PILOTS ================= */
let pilots=JSON.parse(localStorage.getItem("vups_pilots"))||[
{name:"AI Chen",fatigue:0},
{name:"AI Martinez",fatigue:0},
{name:"AI Singh",fatigue:0},
{name:"AI Rossi",fatigue:0}
];

let flights=JSON.parse(localStorage.getItem("vups_flights"))||[];

/* ================= DISTANCE ================= */
function hav(a,b){
const R=3440;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(b.lat-a.lat);
const dLon=toRad(b.lon-a.lon);
const lat1=toRad(a.lat);
const lat2=toRad(b.lat);
const aCalc=Math.sin(dLat/2)**2+
Math.sin(dLon/2)**2*Math.cos(lat1)*Math.cos(lat2);
const c=2*Math.atan2(Math.sqrt(aCalc),Math.sqrt(1-aCalc));
return R*c;
}

function weightedHub(){
let total=0;
Object.values(hubs).forEach(h=>total+=h.weight);
let r=Math.random()*total;
for(let k in hubs){
r-=hubs[k].weight;
if(r<=0)return k;
}
}

/* ================= DISPATCH ================= */
function dispatch(pilot){
let from=weightedHub();
let to=weightedHub();
while(to===from)to=weightedHub();

const dist=hav(hubs[from],hubs[to]);
const hours=(dist/480)+0.7;

let aircraft="B757F";
if(dist>2500)aircraft="B767F";
if(dist>4500)aircraft="B747-8F";

let delay=0;
if(Math.random()<0.15)delay=0.5;

let revenue=Math.floor(Math.random()*180000)+60000;

flights.push({
id:"5Y"+Math.floor(Math.random()*900+100),
pilot:pilot.name,
from,to,aircraft,
start:Date.now(),
duration:(hours+delay)*3600000,
revenue
});
}

/* ================= ENGINE ================= */
function engine(){
const now=Date.now();

flights=flights.filter(f=>{
let pct=(now-f.start)/f.duration;
if(pct>=1){
treasury+=f.revenue*0.45;
pilots.find(p=>p.name===f.pilot).fatigue+=8;
dispatch(pilots.find(p=>p.name===f.pilot));
return false;
}
return true;
});

pilots.forEach(p=>{
if(!flights.find(f=>f.pilot===p.name)){
dispatch(p);
}
if(p.fatigue>0)p.fatigue-=0.02;
});

updateBoard();
save();
}

function updateBoard(){
const tbody=document.getElementById("flight-tbody");
tbody.innerHTML="";
const now=Date.now();

flights.forEach(f=>{
let pct=Math.min(1,(now-f.start)/f.duration);
let eta=new Date(f.start+f.duration)
.toUTCString().split(" ")[4];

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${f.id}</td>
<td>${f.from}→${f.to}</td>
<td>${f.aircraft}</td>
<td>${f.pilot}</td>
<td>${(pct*100).toFixed(1)}%</td>
<td>${eta}Z</td>
<td>${f.revenue.toLocaleString()}</td>
<td>${pilots.find(p=>p.name===f.pilot).fatigue.toFixed(1)}%</td>
`;
tbody.appendChild(tr);
});

document.getElementById("treasury-display")
.innerText="$"+treasury.toLocaleString();
}

function save(){
localStorage.setItem("vups_treasury",treasury);
localStorage.setItem("vups_pilots",JSON.stringify(pilots));
localStorage.setItem("vups_flights",JSON.stringify(flights));
}

/* ================= STOCK ================= */
function setupFinnhub(){
if(!localStorage.getItem("finnhub")){
let key=prompt("Enter your free Finnhub API key:");
localStorage.setItem("finnhub",key);
}
}

async function updateStocks(){
const key=localStorage.getItem("finnhub");
if(!key)return;

try{
const ups=await fetch(`https://finnhub.io/api/v1/quote?symbol=UPS&token=${key}`).then(r=>r.json());
const fdx=await fetch(`https://finnhub.io/api/v1/quote?symbol=FDX&token=${key}`).then(r=>r.json());
let vups=(ups.c*1.15).toFixed(2);

document.getElementById("stockbar").innerText=
`UPS $${ups.c} | FDX $${fdx.c} | VUPS $${vups}`;
}catch{
document.getElementById("stockbar").innerText="Stock API error";
}
}

setupFinnhub();
updateStocks();
setInterval(updateStocks,60000);

/* ================= START ================= */
setInterval(engine,60000);
engine();

</script>
</body>
</html>
